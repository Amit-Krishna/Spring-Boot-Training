<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Raise Salary</title>
</head>
<body>

<h2>Raise Salary</h2>

<form action="/raiseSalary" method="post">

    Enter Employee Id:
    <input type="number" name="id">

    <button type="submit">Raise Salary</button>

</form>

<br>

<p style="color:red;" th:text="${error}"></p>
<p style="color:green;" th:text="${success}"></p>

<br>

<form action="/Main" method="get">
    <button type="submit">Back</button>
</form>

</body>
</html>
