
spring.application.name=Api-Gateway-Dependency
server.port=9999

# --- NON-EUREKA SERVICES (Use http://localhost) ---

# 1. Products (Specific)
spring.cloud.gateway.server.webmvc.routes[0].id=Hello
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8020
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/products/**


# --- EUREKA CONNECTED SERVICES (Use lb://SERVICE-NAME) ---

# 3. Payment Data
spring.cloud.gateway.server.webmvc.routes[1].id=CART-PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://CART-PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/getPaymentData/**

# 4. Cart Data (Specific)
spring.cloud.gateway.server.webmvc.routes[2].id=CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/cart/getData/**

# 5. Cart Bank Data (Specific)
spring.cloud.gateway.server.webmvc.routes[3].id=ICICI-Bank
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://ICICI-BANK
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/getBankData/**


# 6. Generic Cart (Catch-all - Evaluated last so it doesn't swallow routes 2 & 3)
spring.cloud.gateway.server.webmvc.routes[4].id=HelloCartServices
spring.cloud.gateway.server.webmvc.routes[4].uri=http://localhost:8888
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/cart/**